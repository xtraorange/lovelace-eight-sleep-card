name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build dist
        run: npm run build
      - name: Ensure tagged commit has up-to-date dist
        run: git diff --exit-code -- dist/eight-sleep-card.js
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/eight-sleep-card.js

