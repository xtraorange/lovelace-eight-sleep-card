name: Validate

on:
  push:
  pull_request:

jobs:
  basic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check required files
        run: |
          test -f hacs.json
          test -f README.md
          test -f dist/eight-sleep-card.js
      - name: Ensure dist is generated from src
        run: |
          npm run build
          git diff --exit-code -- dist/eight-sleep-card.js
